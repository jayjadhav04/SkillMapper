<?xml version="1.0" encoding="UTF-8"?>
<!-- Favicon SVG approximating the provided mountain + gold ring logo -->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 1024 1024" role="img" aria-label="SkillMapper favicon">
  <defs>
    <radialGradient id="goldGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFD966"/>
      <stop offset="50%" stop-color="#E6B24C"/>
      <stop offset="100%" stop-color="#B8832B"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6" />
    </filter>
  </defs>

  <!-- black background -->
  <rect width="100%" height="100%" fill="#000"/>

  <!-- gold ring behind the mountain -->
  <g transform="translate(512,260)">
    <circle r="200" fill="none" stroke="url(#goldGrad)" stroke-width="40" stroke-linecap="round" filter="url(#soft)"/>
    <!-- small gap at bottom to mimic original -->
    <path d="M -170 0 A 170 170 0 0 1 170 0" fill="none" stroke="#000" stroke-width="36" stroke-linecap="round"/>
  </g>

  <!-- mountain silhouette (white) -->
  <g transform="translate(0,120)">
    <path d="M120 700 L360 320 L512 440 L664 320 L904 700 L738 700 L664 560 L512 700 L360 560 L288 700 Z"
          fill="#fff" stroke="#fff" stroke-linejoin="round"/>
    <!-- sharpened lightning-like edges -->
    <path d="M360 320 L420 380 L390 430 L460 390 L512 440" fill="#fff"/>
  </g>

</svg>
